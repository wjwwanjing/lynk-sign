#!name = 领克 Token 自动提取
#!desc = 自动保存登录 Token，并捕获分享风控头和成功签到的原生签名结构。
#!author = wjwwanjing
#!homepage = https://github.com/wjwwanjing/lynk-sign

[rewrite_local]
^https?://app-services\.lynkco\.com\.cn/.*login url script-response-body https://raw.githubusercontent.com/wjwwanjing/lynk-sign/main/lynk_token.js
^https?://app-api-gw-toc\.lynkco\.com/app/v1/task/getShareCode url script-response-body https://raw.githubusercontent.com/wjwwanjing/lynk-sign/main/lynk_share_capture.js
^https?://app-api-gw-toc\.lynkco\.com/up/api/v1/user/sign/upgrade(?:\?.*)?$ url script-response-body https://raw.githubusercontent.com/wjwwanjing/lynk-sign/main/lynk_sign_capture.js?v=20260723-1

[mitm]
hostname = app-services.lynkco.com.cn, app-api-gw-toc.lynkco.com
